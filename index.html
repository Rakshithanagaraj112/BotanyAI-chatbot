<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌿 Botany AI Chatbot</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; background: #e8f5e9; }
    header { background-color: #2e7d32; color: #fff; padding: 20px; font-size: 1.8em; font-weight: bold; text-align: center; }
    #chatbox { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
    .message { margin: 8px 0; padding: 12px 16px; border-radius: 20px; max-width: 65%; word-wrap: break-word; }
    .user { background-color: #c8e6c9; align-self: flex-end; text-align: right; }
    .bot  { background-color: #a5d6a7; align-self: flex-start; text-align: left; }
    #faqBar { background-color: #dcedc8; padding: 10px; display: flex; flex-wrap: wrap; gap: 10px; }
    .faq-item { background-color: #81c784; padding: 8px 12px; border-radius: 20px; cursor: pointer; }
    #inputArea { display: flex; flex-wrap: wrap; padding: 12px; background-color: #f1f8e9; gap: 10px; align-items: center; }
    #userInput { flex: 1; padding: 12px; border: 2px solid #66bb6a; border-radius: 25px; }
    #sendBtn, #scanBtn, #cameraBtn, #captureBtn { padding: 12px 20px; background-color: #388e3c; color: white; border: none; border-radius: 25px; cursor: pointer; }
    #leafUpload { border: 2px solid #66bb6a; border-radius: 25px; padding: 8px; background: #fff; }
    .image-preview { max-width: 220px; border-radius: 10px; margin-top: 8px; }
    #cameraView { display: none; flex-direction: column; align-items: center; margin-top: 10px; }
    video { border: 2px solid #66bb6a; border-radius: 10px; max-width: 300px; }
    canvas { display: none; }
  </style>
</head>
<body>
  <header>🌿 Botany AI Chatbot</header>
  <div id="chatbox"></div>

  <div id="faqBar">
    <div class="faq-item">Plant Classification 🌳</div>
    <div class="faq-item">Photosynthesis Process 🌞</div>
    <div class="faq-item">Soil & Nutrients 🌾</div>
    <div class="faq-item">Plant Diseases & Pests 🐛</div>
  </div>

  <div id="inputArea">
    <input type="text" id="userInput" placeholder="Ask Botany AI about plants..." />
    <button id="sendBtn">Send</button>

    <input type="file" id="leafUpload" accept="image/*" />
    <button id="scanBtn">Analyze Plant</button>

    <button id="cameraBtn">📷 Take Photo</button>
    <button id="captureBtn" style="display:none;">📸 Capture & Analyze</button>
  </div>

  <div id="cameraView">
    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>
  </div>

  <script>
    const chatbox = document.getElementById("chatbox");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const faqItems = document.querySelectorAll(".faq-item");
    const leafUpload = document.getElementById("leafUpload");
    const scanBtn = document.getElementById("scanBtn");
    const cameraBtn = document.getElementById("cameraBtn");
    const captureBtn = document.getElementById("captureBtn");
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const cameraView = document.getElementById("cameraView");

    let imageSent = false;

    function addMessage(text, sender) {
      const msg = document.createElement("div");
      msg.className = `message ${sender}`;
      msg.textContent = text;
      chatbox.appendChild(msg);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    function addImageMessage(src) {
      const msg = document.createElement("div");
      msg.className = "message user";
      const img = document.createElement("img");
      img.src = src;
      img.className = "image-preview";
      msg.appendChild(img);
      chatbox.appendChild(msg);
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    async function sendMessage(message) {
      addMessage(message, "user");
      try {
        const response = await fetch("http://localhost:5000/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });
        const data = await response.json();
        addMessage(data.reply, "bot");
      } catch {
        addMessage("⚠️ Unable to connect to Botany AI server.", "bot");
      }
    }

    async function analyzePlant(file) {
      if (!file || imageSent) return;
      imageSent = true;

      const reader = new FileReader();
      reader.onload = () => addImageMessage(reader.result);
      reader.readAsDataURL(file);

      const formData = new FormData();
      formData.append("file", file);

      try {
        const response = await fetch("http://localhost:5000/scan", {
          method: "POST",
          body: formData
        });
        const data = await response.json();
        addMessage(data.reply, "bot");
      } catch {
        addMessage("⚠️ Plant analysis failed.", "bot");
      }
    }

    cameraBtn.onclick = async () => {
      cameraView.style.display = "flex";
      captureBtn.style.display = "inline-block";
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
      } catch {
        addMessage("⚠️ Camera access denied.", "bot");
      }
    };

    captureBtn.onclick = () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => {
        const file = new File([blob], "plant.jpg", { type: "image/jpeg" });
        const src = URL.createObjectURL(blob);
        addImageMessage(src);
        analyzePlant(file);
        stopCamera();
      }, "image/jpeg");
    };

    function stopCamera() {
      const stream = video.srcObject;
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
      }
      cameraView.style.display = "none";
      captureBtn.style.display = "none";
    }

    sendBtn.onclick = () => {
      const message = userInput.value.trim();
      if (!message) return;
      userInput.value = "";
      sendMessage(message);
    };

    userInput.addEventListener("keypress", e => { if (e.key === "Enter") sendBtn.click(); });
    faqItems.forEach(item => item.addEventListener("click", () => sendMessage(item.textContent)));
    scanBtn.onclick = () => {
      if (leafUpload.files[0]) {
        imageSent = false;
        analyzePlant(leafUpload.files[0]);
      }
    };
  </script>
</body>
</html>
